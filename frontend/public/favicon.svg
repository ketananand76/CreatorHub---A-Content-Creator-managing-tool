<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient: Purple to Cyan -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Accent Gradient: Fuchsia to Violet -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Glow Filter for Vector Elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Styled 'C' Loop representing Creator & Community -->
  <path 
    d="M 390 140 
       A 170 170 0 1 0 390 372" 
    fill="none" 
    stroke="url(#brandGrad)" 
    stroke-width="42" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />

  <!-- Nested Inner Core Hub (glowing 4-point star/sparkle representing Content Excellence) -->
  <path 
    d="M 270 140 
       L 290 220 
       L 370 240 
       L 290 260 
       L 270 340 
       L 250 260 
       L 170 240 
       L 250 220 
       Z" 
    fill="url(#accentGrad)" 
    filter="url(#glow)"
  />

  <!-- Decorative Orbit Dots representing Network Channels (YouTube, Insta, TikTok, etc.) -->
  <circle cx="390" cy="140" r="16" fill="#06b6d4" />
  <circle cx="390" cy="372" r="16" fill="#ec4899" />
  <circle cx="100" cy="240" r="12" fill="#8b5cf6" />
</svg>